/* FINAL MOBILE 3-COLUMN OVERRIDE */
@media (max-width: 700px) {
  .grid,
  .category-grid,
  #productsGrid,
  #featuredGrid {
    display: grid !important;
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
    gap: 8px !important;
  }

  .card {
    border-radius: 12px !important;
    min-width: 0 !important;
  }

  .imgbox {
    aspect-ratio: 1 / 1 !important;
  }

  .content {
    padding: 7px !important;
    gap: 4px !important;
    min-height: auto !important;
  }

  .category {
    font-size: 8px !important;
    line-height: 1.15 !important;
  }

  .title {
    font-size: 10.5px !important;
    line-height: 1.18 !important;
    min-height: 25px !important;
    -webkit-line-clamp: 2 !important;
  }

  .desc,
  .specs,
  .preview-desc {
    display: none !important;
  }

  .price {
    font-size: 11px !important;
    line-height: 1.1 !important;
  }

  .badge {
    font-size: 8px !important;
    padding: 3px 5px !important;
  }

  .btn,
  .product-actions button {
    min-height: 30px !important;
    font-size: 9px !important;
    padding: 6px 4px !important;
    border-radius: 9px !important;
  }

    gap: 5px !important;
    padding-top: 3px !important;
  }

    padding-right: 8px !important;

/* MOBILE: DO NOT KEEP SEARCH/FILTER BAR STICKY */

  }

/* MODERN ELECTRONICS UI V1 */
:root{
  --bg:#F5F7FA;
  --surface:#FFFFFF;
  --surface2:#F8FAFC;
  --text:#0F172A;
  --muted:#64748B;
  --line:#E5E7EB;
  --accent:#2563EB;
  --theme:#0F172A;
  --ok:#16A34A;
  --warn:#F59E0B;
  --danger:#DC2626;
  --shadow-sm:0 8px 22px rgba(15,23,42,.06);
  --shadow-md:0 18px 48px rgba(15,23,42,.12);
}

body{
  background:
    radial-gradient(circle at 20% -10%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 32%),
    var(--bg) !important;
  color:var(--text) !important;
}

header{
  background:linear-gradient(135deg,var(--theme),#111827 52%,color-mix(in srgb, var(--theme) 72%, #FFFFFF)) !important;
  border-bottom:none !important;
  padding:24px 16px 30px !important;
}

h1{
  font-weight:800 !important;
  letter-spacing:-.04em !important;
}

.subtitle{
  max-width:680px;
  color:#CBD5E1 !important;
}

.toolbar{
  position:static !important;
  background:rgba(255,255,255,.82) !important;
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(226,232,240,.75) !important;
  box-shadow:none !important;
}

.toolbar-grid input,
.toolbar-grid select{
  border:1px solid rgba(203,213,225,.78) !important;
  background:#FFFFFF !important;
  box-shadow:0 1px 0 rgba(15,23,42,.02);
}

.chip{
  border:none !important;
  background:#FFFFFF !important;
  color:#475569 !important;
  box-shadow:0 6px 18px rgba(15,23,42,.06);
  font-weight:800 !important;
}

.chip.active{
  background:var(--theme) !important;
  color:#FFFFFF !important;
  box-shadow:0 10px 28px rgba(15,23,42,.18),0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent) !important;
}

.stats{
  color:#64748B !important;
  font-weight:700;
}

.grid{
  gap:16px !important;
}

.card{
  border:1px solid rgba(226,232,240,.72) !important;
  border-radius:22px !important;
  background:rgba(255,255,255,.94) !important;
  box-shadow:var(--shadow-sm) !important;
  overflow:hidden !important;
  transform:translateZ(0);
}

.card:hover{
  transform:translateY(-3px) !important;
  box-shadow:var(--shadow-md) !important;
}

.imgbox{
  background:
    radial-gradient(circle at 50% 18%, #FFFFFF 0%, #F1F5F9 54%, #E8EDF4 100%) !important;
  aspect-ratio:1 / 1 !important;
  padding:10px !important;
}

.imgbox img{
  object-fit:contain !important;
  filter:drop-shadow(0 14px 22px rgba(15,23,42,.10));
  transform:scale(.94);
}

.content{
  padding:13px !important;
  gap:7px !important;
}

.category{
  font-size:10px !important;
  color:#64748B !important;
  letter-spacing:.08em !important;
}

.title{
  font-size:15px !important;
  line-height:1.18 !important;
  font-weight:750 !important;
  letter-spacing:-.025em !important;
  min-height:36px !important;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.desc{
  display:none !important;
}

.specs{
  gap:5px !important;
  min-height:0 !important;
}

.spec{
  background:#F1F5F9 !important;
  border:none !important;
  color:#475569 !important;
  font-size:10px !important;
  padding:5px 7px !important;
}

.price{
  font-size:18px !important;
  letter-spacing:-.04em !important;
  color:#0F172A !important;
}

.badge{
  border:none !important;
  font-size:10px !important;
  padding:5px 7px !important;
  background:#DCFCE7 !important;
  color:#15803D !important;
}

.badge.low{background:#FEF3C7 !important;color:#B45309 !important}
.badge.sold{background:#FEE2E2 !important;color:#B91C1C !important}

.ribbons{
  top:10px !important;
  left:10px !important;
}

.ribbon{
  border-radius:999px !important;
  padding:6px 8px !important;
  font-size:9px !important;
  box-shadow:0 10px 22px rgba(15,23,42,.14) !important;
}

.actions .btn,
.card .btn{
  border-radius:13px !important;
  background:var(--theme) !important;
  min-height:42px !important;
  font-size:13px !important;
  letter-spacing:-.01em;
}

.cartbar{
  background:rgba(255,255,255,.94) !important;
  backdrop-filter:blur(18px);
  border-top:1px solid rgba(226,232,240,.9) !important;
  box-shadow:0 -16px 42px rgba(15,23,42,.10) !important;
}

.cart-inner{
  border-radius:20px;
}

.whatsapp{
  border-radius:14px !important;
  min-height:46px;
}

/* Product bottom sheet */
.modal-overlay{
  align-items:flex-end !important;
  justify-content:center !important;
  padding:0 !important;
  background:rgba(15,23,42,.56) !important;
  backdrop-filter:blur(4px);
}

.modal-box{
  width:min(100vw,860px) !important;
  max-height:92vh !important;
  border-radius:30px 30px 0 0 !important;
  padding:0 !important;
  overflow:hidden !important;
  box-shadow:0 -22px 70px rgba(15,23,42,.30) !important;
  animation:sheetUp .22s ease-out both;
}

@keyframes sheetUp{
  from{transform:translateY(24px);opacity:.92}
  to{transform:translateY(0);opacity:1}
}

.product-sheet{
  max-height:92vh;
  overflow:auto;
  background:#FFFFFF;
}

.sheet-hero{
  position:relative;
  background:linear-gradient(180deg,#F8FAFC,#EEF2F7);
  padding:18px 18px 20px;
}

.sheet-close{
  position:absolute;
  right:16px;
  top:14px;
  width:42px;
  height:42px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,.9);
  box-shadow:0 10px 28px rgba(15,23,42,.10);
  font-size:22px;
  line-height:1;
  z-index:2;
}

.sheet-image-wrap{
  width:100%;
  display:grid;
  place-items:center;
  min-height:260px;
  padding:24px 8px 12px;
}

.sheet-image{
  max-width:min(360px,82vw);
  width:100%;
  max-height:360px;
  object-fit:contain;
  filter:drop-shadow(0 20px 30px rgba(15,23,42,.13));
}

.sheet-body{
  padding:20px 18px 110px;
}

.sheet-kicker{
  color:#64748B;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:7px;
}

.sheet-title{
  margin:0;
  font-size:28px;
  line-height:1.03;
  letter-spacing:-.055em;
  font-weight:800;
}

.sheet-desc{
  color:#475569;
  line-height:1.5;
  font-size:14px;
  margin:12px 0 14px;
}

.sheet-specs{
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.sheet-section-title{
  font-size:16px;
  margin:18px 0 10px;
  letter-spacing:-.025em;
}

.variant-modern{
  border:1px solid #E5E7EB;
  border-radius:18px;
  padding:13px;
  margin:9px 0;
  background:#FFFFFF;
  box-shadow:0 8px 20px rgba(15,23,42,.045);
}

.variant-modern.sold{
  opacity:.58;
}

.variant-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}

.variant-name{
  font-weight:800 !important;
  font-size:15px !important;
  letter-spacing:-.025em;
}

.variant-meta{
  color:#64748B !important;
  font-size:12px !important;
  line-height:1.35;
}

.variant-price{
  font-size:18px;
  font-weight:850;
  letter-spacing:-.04em;
  white-space:nowrap;
}

.variant-controls{
  display:grid;
  grid-template-columns:118px 1fr;
  gap:10px;
  align-items:center;
  margin-top:12px;
}

.qty-stepper{
  display:grid;
  grid-template-columns:34px 1fr 34px;
  align-items:center;
  border:1px solid #E2E8F0;
  border-radius:14px;
  overflow:hidden;
  min-height:40px;
  background:#F8FAFC;
}

.qty-stepper button{
  border:none;
  background:#FFFFFF;
  min-height:40px;
  font-weight:900;
  font-size:17px;
}

.qty-stepper input{
  border:none !important;
  background:transparent !important;
  text-align:center;
  padding:0 !important;
  min-width:0;
  font-weight:800;
}

.add-modern{
  border:none;
  background:var(--accent);
  color:white;
  border-radius:14px;
  min-height:42px;
  font-weight:900;
}

.add-modern:disabled{
  opacity:.5;
}

.sheet-sticky{
  position:sticky;
  bottom:0;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(18px);
  border-top:1px solid #E5E7EB;
  padding:12px 18px calc(12px + env(safe-area-inset-bottom));
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.sheet-sticky .mini{
  color:#64748B;
  font-size:12px;
  font-weight:800;
}

.sheet-sticky strong{
  display:block;
  font-size:18px;
  letter-spacing:-.04em;
}

/* PREMIUM MOTION SYSTEM V2 */
:root{
  --ease-premium:cubic-bezier(.22,1,.36,1);
  --ease-pop:cubic-bezier(.34,1.56,.64,1);
}

@media (prefers-reduced-motion:no-preference){
  header,
  .home-hero-modern,
  .toolbar,
  .category-chips-wrap,
  .merch-section,
  .stats,
  .grid{
    animation:fadeUpPremium .55s var(--ease-premium) both;
  }

  .home-hero-modern{animation-delay:.03s}
  .toolbar{animation-delay:.08s}
  .category-chips-wrap{animation-delay:.11s}
  .merch-section{animation-delay:.14s}
  .stats{animation-delay:.18s}
  .grid{animation-delay:.22s}

  .card{
    animation:cardEnterPremium .48s var(--ease-premium) both;
    transition:
      transform .24s var(--ease-premium),
      box-shadow .24s var(--ease-premium),
      border-color .24s var(--ease-premium),
      background .24s var(--ease-premium);
  }

  .grid .card:nth-child(1){animation-delay:.02s}
  .grid .card:nth-child(2){animation-delay:.05s}
  .grid .card:nth-child(3){animation-delay:.08s}
  .grid .card:nth-child(4){animation-delay:.11s}
  .grid .card:nth-child(5){animation-delay:.14s}
  .grid .card:nth-child(6){animation-delay:.17s}
  .grid .card:nth-child(7){animation-delay:.20s}
  .grid .card:nth-child(8){animation-delay:.23s}

  .card:hover{
    transform:translateY(-6px) scale(1.01) !important;
  }

  .card:active,
  button:active{
    transform:scale(.975);
  }

  .imgbox img{
    transition:transform .38s var(--ease-premium), filter .38s var(--ease-premium);
  }

  .card:hover .imgbox img{
    transform:scale(.99);
    filter:drop-shadow(0 26px 34px rgba(0,0,0,.42)) !important;
  }

  .hero-card-modern{
    animation:heroGlowIn .72s var(--ease-premium) both;
  }

  .hero-card-modern::after{
    animation:floatingPanel 6s ease-in-out infinite alternate;
  }

  .hero-btn,
  .btn,
  .add-modern,
  .whatsapp,
  .cart-primary,
  .floating-cart-btn,
  .brand-pill-modern,
  .chip,
  .category-chip{
    transition:
      transform .20s var(--ease-premium),
      box-shadow .20s var(--ease-premium),
      background .20s var(--ease-premium),
      border-color .20s var(--ease-premium);
  }

  .hero-btn:hover,
  .btn:hover,
  .add-modern:hover,
  .whatsapp:hover,
  .cart-primary:hover{
    transform:translateY(-2px);
  }

  .modal-overlay,
  .cart-drawer-overlay,
  .mobile-filter-sheet{
    animation:overlayFadeIn .18s ease-out both;
  }

  .modal-box,
  .cart-drawer,
  .mobile-filter-panel{
    animation:sheetRisePremium .28s var(--ease-premium) both !important;
  }

  .variant-modern,
  .cart-line{
    animation:fadeUpPremium .34s var(--ease-premium) both;
  }

  .floating-cart-btn{
    animation:floatingCartEnter .32s var(--ease-pop) both;
  }

  .floating-cart-btn.bump{
    animation:cartBump .42s var(--ease-pop) both;
  }

  .add-modern.added,
  .add-modern.just-added{
    animation:addSuccessPulse .55s var(--ease-pop) both;
  }
}

@keyframes fadeUpPremium{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes cardEnterPremium{
  from{opacity:0;transform:translateY(18px) scale(.975)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

@keyframes heroGlowIn{
  from{opacity:0;transform:translateY(18px) scale(.985);filter:blur(5px)}
  to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}

@keyframes floatingPanel{
  from{transform:rotate(-4deg) translate3d(0,0,0)}
  to{transform:rotate(-2deg) translate3d(8px,-8px,0)}
}

@keyframes overlayFadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes sheetRisePremium{
  from{opacity:.82;transform:translateY(34px) scale(.985)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

@keyframes floatingCartEnter{
  from{opacity:0;transform:translateY(18px) scale(.88)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

@keyframes cartBump{
  0%{transform:scale(1)}
  45%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

@keyframes addSuccessPulse{
  0%{transform:scale(1)}
  45%{transform:scale(.96);box-shadow:0 0 0 6px rgba(34,197,94,.16)}
  100%{transform:scale(1)}
}

.skeleton-line,
.skeleton-card{
  position:relative;
  overflow:hidden;
  background:rgba(255,255,255,.08);
}

.skeleton-line::after,
.skeleton-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);
  transform:translateX(-100%);
  animation:skeletonSweep 1.2s ease-in-out infinite;
}

@keyframes skeletonSweep{
  to{transform:translateX(100%)}
}

}

.floating-cart-btn .count{
  background:#FACC15 !important;
  color:#071120 !important;
}

footer{

</style>
</head>
<body>
<header><div class="wrap"><div class="brand-row"><img id="logo" class="logo"><div><h1 id="storeName">Electronics Catalog</h1><p id="welcome" class="subtitle">Loading catalog...</p></div></div></div></header>
<div class="toolbar"><div class="toolbar-grid"><input id="search" placeholder="Search brand, model, SKU, specs..."><select id="brandFilter"><option value="">All brands</option></select><select id="sort"><option value="featured">Featured first</option><option value="priceLow">Price: low to high</option><option value="priceHigh">Price: high to low</option><option value="stock">Available first</option></select></div>

      <div class="mobile-browse-bar">
        <div class="mobile-search-shell">
          <div class="mobile-search">
            <input id="mobileSearchInput" placeholder="Search phones, laptops, TVs..." autocomplete="off">
            <button id="mobileSearchClear" class="mobile-search-clear" type="button">×</button>
          </div>
          <button class="mobile-filter-btn" type="button" onclick="openMobileFilters()">☰</button>
        </div>
      </div>
<div id="chips" class="chips"></div></div>
<main class="wrap">

<section id="homeHero" class="home-hero-modern"></section>
<section id="brandStripSection" class="merch-section"></section>
<section id="featuredSection" class="merch-section"></section>
<section id="dealsSection" class="merch-section"></section>
<div id="stats" class="stats">Loading...</div><div id="featured" class="featured"></div><div id="grid" class="grid"></div></main>
<footer class="wrap" id="footer"></footer>
<div class="cartbar"><div class="cart-inner"><div class="cart-info"><strong id="cartCount">0 items</strong> · <span id="cartTotal">SRD 0</span></div><button class="btn-soft" onclick="openCart()">View Cart</button><button class="whatsapp" onclick="openCart()">Checkout WhatsApp</button></div></div>
<div id="toast" class="toast"></div>
<script>
const CATALOG_API_URL = 'https://script.google.com/macros/s/AKfycbzsXy8qj0UWmid2K-3MOl-dAT7jYjuRKY5Iw4Q0EoY7rA2b_l87-cBbeBiYFwY4hY851A/exec';
const state = {data:null, products:[], filtered:[], category:'', brand:'', search:'', cart:{}};
function apiUrl(params){ const base = CATALOG_API_URL || location.href.split('?')[0]; const u = new URL(base); Object.keys(params||{}).forEach(k=>u.searchParams.set(k, params[k])); u.searchParams.set('_', Date.now()); return u.toString(); }
function jsonp(params){ return new Promise((resolve,reject)=>{ const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2); window[cb]=d=>{delete window[cb]; s.remove(); resolve(d)}; const s=document.createElement('script'); s.src=apiUrl({...params, callback:cb}); s.onerror=()=>reject(new Error('Could not load API')); document.body.appendChild(s); }); }
function displayPrice(usd){
  const s=state.data?.settings||{};
  const rate=Number(s.exchangeRateUsdToSrd||s.exchangeRate||1);
  const roundTo=Number(s.roundDisplayPriceTo||5);
  const raw=Number(usd||0)*rate;
  return roundTo>0 ? Math.round(raw/roundTo)*roundTo : raw;
}
function moneyFromBase(n){ const c=state.data?.settings?.displayCurrency||state.data?.settings?.currency||'SRD'; return c+' '+Number(displayPrice(n)||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}); }
function moneyDisplay(n){ const c=state.data?.settings?.displayCurrency||state.data?.settings?.currency||'SRD'; return c+' '+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}); }

function applySettingsTheme(settings){
  settings = settings || {};
  const root = document.documentElement;

  const theme = settings.themeColor || settings.theme || settings['Theme Color'] || '';
  const accent = settings.accentColor || settings.accent || settings['Accent Color'] || '';

  if (theme) root.style.setProperty('--theme', theme);
  if (accent) root.style.setProperty('--accent', accent);

  // Keep important derived colors tied to settings.
  if (theme) {
    root.style.setProperty('--text', '#0F172A');
  }
}

function money(n){ return moneyFromBase(n); }
function esc(s){ return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2400); }
async function load(){ const data=await jsonp({action:'catalog'}); if(!data.ok) throw new Error(data.error||'API error'); state.data=data; state.products=data.products||[]; applySettings(); renderFilters(); filter(); }
function applySettings(){ const s=state.data.settings||{}; document.documentElement.style.setProperty('--theme', s.themeColor||'#0F172A'); document.documentElement.style.setProperty('--accent', s.accentColor||'#2563EB'); document.title=s.storeName||'Electronics Catalog'; document.getElementById('storeName').textContent=s.storeName||s.catalogTitle||'Electronics Catalog'; document.getElementById('welcome').textContent=s.welcomeText||''; document.getElementById('footer').textContent=s.footerText||''; const logo=document.getElementById('logo'); if(s.logoUrl){ logo.src=s.logoUrl; logo.style.display='block'; } }
function renderFilters(){ const cats=['All',...(state.data.categories||[])]; document.getElementById('chips').innerHTML=cats.map(c=>`<button class="chip ${(!state.category&&c==='All')||state.category===c?'active':''}" onclick="setCategory('${esc(c==='All'?'':c)}')">${esc(c)}</button>`).join(''); const brand=document.getElementById('brandFilter'); brand.innerHTML='<option value="">All brands</option>'+(state.data.brands||[]).map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join(''); }
function setCategory(c){ state.category=c; renderFilters(); filter(); }
document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value.toLowerCase();filter();});
document.getElementById('brandFilter').addEventListener('change',e=>{state.brand=e.target.value;filter();});
document.getElementById('sort').addEventListener('change',filter);
function filter(){ let p=[...state.products]; if(state.category)p=p.filter(x=>x.category===state.category); if(state.brand)p=p.filter(x=>x.brand===state.brand); if(state.search){ const q=state.search; p=p.filter(x=>JSON.stringify([x.brand,x.productName,x.category,x.subcategory,x.description,x.specs,x.variants]).toLowerCase().includes(q)); } const sort=document.getElementById('sort').value; if(sort==='priceLow')p.sort((a,b)=>a.minPrice-b.minPrice); if(sort==='priceHigh')p.sort((a,b)=>b.minPrice-a.minPrice); if(sort==='stock')p.sort((a,b)=>b.stockAvailable-a.stockAvailable); state.filtered=p; render(); }
function statusClass(s){ return s==='Sold Out'?'sold':(s==='Low Stock'?'low':''); }
function specsHtml(specs){ return String(specs||'').split(/[•,|;]/).map(x=>x.trim()).filter(Boolean).slice(0,4).map(x=>`<span class="spec">${esc(x)}</span>`).join(''); }
function ribbons(p){ return `<div class="ribbons">${p.featured?'<span class="ribbon r-featured">Featured</span>':''}${p.new?'<span class="ribbon r-new">New</span>':''}${p.hot?'<span class="ribbon r-hot">Popular</span>':''}${p.sale?'<span class="ribbon r-sale">Deal</span>':''}</div>`; }
function card(p){
  const name=[p.brand,p.productName].filter(Boolean).join(' ');
  const sub=p.subcategory?' / '+p.subcategory:'';
  return `<article class="card" onclick="openProduct('${esc(p.productId)}')">
    ${ribbons(p)}
    <div class="imgbox">${p.imageUrl?`<img src="${esc(p.imageUrl)}" loading="lazy" alt="${esc(name)}">`:'<div class="noimg">No image</div>'}</div>
    <div class="content">
      <div class="category">${esc(p.category)}${esc(sub)}</div>
      <div class="title">${esc(name)}</div>
      <div class="desc">${esc(p.description||'Tap to view available models, prices, warranty and stock.')}</div>
      <div class="specs">${specsHtml(p.specs)}</div>
      <div class="row"><div class="price">${money(p.minPrice)}</div><span class="badge ${statusClass(p.stockStatus)}">${esc(p.stockStatus)}</span></div>
      <div class="actions"><button class="btn" onclick="event.stopPropagation();openProduct('${esc(p.productId)}')">View</button></div>
    </div>
  </article>`;
}

function syncMobileSearch(){
  const desktop = document.getElementById('searchInput') || document.getElementById('search');
  const mobile = document.getElementById('mobileSearchInput');
  const clear = document.getElementById('mobileSearchClear');
  if(!desktop || !mobile) return;

  if(mobile.dataset.bound === '1') return;
  mobile.dataset.bound = '1';

  mobile.value = desktop.value || '';
  const updateClear = () => clear && clear.classList.toggle('show', !!mobile.value.trim());
  updateClear();

  mobile.addEventListener('input', () => {
    desktop.value = mobile.value;
    desktop.dispatchEvent(new Event('input', { bubbles:true }));
    updateClear();
  });

  if(clear){
    clear.addEventListener('click', () => {
      mobile.value = '';
      desktop.value = '';
      desktop.dispatchEvent(new Event('input', { bubbles:true }));
      updateClear();
      mobile.focus();
    });
  }
}

function openMobileFilters(){
  const currentCategoryEl = document.getElementById('categorySelect') || document.getElementById('categoryFilter');
  const currentStockEl = document.getElementById('stockSelect') || document.getElementById('stockFilter');
  const currentSortEl = document.getElementById('sortSelect') || document.getElementById('sortFilter');

  const categoryOptions = currentCategoryEl ? currentCategoryEl.innerHTML : '<option value="">All categories</option>';
  const stockOptions = currentStockEl ? currentStockEl.innerHTML : '<option value="">All stock</option>';
  const sortOptions = currentSortEl ? currentSortEl.innerHTML : '<option value="">Default</option>';

  const sheet = document.createElement('div');
  sheet.className = 'mobile-filter-sheet';
  sheet.innerHTML = `<div class="mobile-filter-panel">
    <div class="mobile-filter-head">
      <h3>Filter products</h3>
      <button class="mobile-filter-close" onclick="this.closest('.mobile-filter-sheet').remove()">×</button>
    </div>

    <div class="filter-group">
      <div class="filter-label">Category</div>
      <select id="mobileCategoryFilter">${categoryOptions}</select>
    </div>

    <div class="filter-group">
      <div class="filter-label">Stock</div>
      <select id="mobileStockFilter">${stockOptions}</select>
    </div>

    <div class="filter-group">
      <div class="filter-label">Sort</div>
      <select id="mobileSortFilter">${sortOptions}</select>
    </div>

    <div class="filter-actions">
      <button class="filter-reset" onclick="resetMobileFilters(this)">Reset</button>
      <button class="filter-apply" onclick="applyMobileFilters(this)">Apply</button>
    </div>
  </div>`;

  sheet.addEventListener('click', e => { if(e.target === sheet) sheet.remove(); });
  document.body.appendChild(sheet);

  if(currentCategoryEl) document.getElementById('mobileCategoryFilter').value = currentCategoryEl.value;
  if(currentStockEl) document.getElementById('mobileStockFilter').value = currentStockEl.value;
  if(currentSortEl) document.getElementById('mobileSortFilter').value = currentSortEl.value;
}

function applyMobileFilters(btn){
  const sheet = btn.closest('.mobile-filter-sheet');
  const pairings = [
    ['mobileCategoryFilter', 'categorySelect', 'categoryFilter'],
    ['mobileStockFilter', 'stockSelect', 'stockFilter'],
    ['mobileSortFilter', 'sortSelect', 'sortFilter']
  ];

  pairings.forEach(ids => {
    const mobile = document.getElementById(ids[0]);
    const desktop = document.getElementById(ids[1]) || document.getElementById(ids[2]);
    if(mobile && desktop){
      desktop.value = mobile.value;
      desktop.dispatchEvent(new Event('change', { bubbles:true }));
    }
  });

  sheet.remove();
}

function resetMobileFilters(btn){
  const sheet = btn.closest('.mobile-filter-sheet');
  ['mobileCategoryFilter','mobileStockFilter','mobileSortFilter'].forEach(id => {
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  applyMobileFilters(btn);
}


/* HOMEPAGE MERCHANDISING JS V1.4 */
function scrollToCatalog(){
  const target = document.querySelector('.stats') || document.querySelector('.grid') || document.querySelector('main');
  if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
}

function setSearchTerm(term){
  const desktop = document.getElementById('searchInput') || document.getElementById('search');
  const mobile = document.getElementById('mobileSearchInput');
  if(desktop){
    desktop.value = term || '';
    desktop.dispatchEvent(new Event('input', {bubbles:true}));
  }
  if(mobile){
    mobile.value = term || '';
    mobile.dispatchEvent(new Event('input', {bubbles:true}));
  }
  scrollToCatalog();
}

function getFeaturedProducts(){
  return (state.products || []).filter(function(p){
    return p.featured || p.hot || p.new || p.sale;
  }).slice(0,10);
}

function getDealProducts(){
  return (state.products || []).filter(function(p){
    return p.sale || p.hot || p.new;
  }).slice(0,4);
}

function getTopBrands(){
  const counts = {};
  (state.products || []).forEach(function(p){
    const b = (p.brand || '').trim();
    if(!b) return;
    counts[b] = (counts[b] || 0) + 1;
  });
  return Object.keys(counts).sort(function(a,b){ return counts[b] - counts[a]; }).slice(0,12);
}

function renderHomeHero(){
  const el = document.getElementById('homeHero');
  if(!el) return;

  const s = state.settings || {};
  const title = s.catalogTitle || 'Premium Electronics';
  const text = s.welcomeText || 'Browse phones, laptops, TVs, power solutions and accessories. Order directly through WhatsApp.';
  const store = s.storeName || 'Electronics Store';

  el.innerHTML = '<div class="hero-card-modern">' +
    '<div class="hero-eyebrow">' + esc(store) + '</div>' +
    '<h2 class="hero-title-modern">' + esc(title) + '</h2>' +
    '<p class="hero-text-modern">' + esc(text) + '</p>' +
    '<div class="hero-actions-modern">' +
      '<button class="hero-btn primary" onclick="scrollToCatalog()">Shop Products</button>' +
      '<button class="hero-btn secondary" onclick="setSearchTerm(\'deals\')">View Deals</button>' +
    '</div>' +
  '</div>';
}

function renderBrandStrip(){
  const el = document.getElementById('brandStripSection');
  if(!el) return;
  const brands = getTopBrands();

  if(!brands.length){
    el.innerHTML = '';
    return;
  }

  el.innerHTML = '<div class="merch-head">' +
    '<div><h2 class="merch-title">Shop by brand</h2><div class="merch-note">Quick access to popular brands</div></div>' +
  '</div>' +
  '<div class="brand-strip-modern">' +
    '<button class="brand-pill-modern active" onclick="setSearchTerm(\'\')">All</button>' +
    brands.map(function(b){
      return '<button class="brand-pill-modern" onclick="setSearchTerm(\'' + esc(b).replace(/'/g,"\'") + '\')">' + esc(b) + '</button>';
    }).join('') +
  '</div>';
}

function renderFeaturedSection(){
  const el = document.getElementById('featuredSection');
  if(!el) return;
  const products = getFeaturedProducts();

  if(!products.length){
    el.innerHTML = '';
    return;
  }

  el.innerHTML = '<div class="merch-head">' +
    '<div><h2 class="merch-title">Featured picks</h2><div class="merch-note">New, hot and recommended items</div></div>' +
    '<button class="brand-pill-modern" onclick="scrollToCatalog()">See all</button>' +
  '</div>' +
  '<div class="feature-strip-modern">' + products.map(card).join('') + '</div>';
}

function renderDealsSection(){
  const el = document.getElementById('dealsSection');
  if(!el) return;
  const products = getDealProducts();

  if(!products.length){
    el.innerHTML = '';
    return;
  }

  el.innerHTML = '<div class="merch-head">' +
    '<div><h2 class="merch-title">Highlights</h2><div class="merch-note">Fast-moving products and special picks</div></div>' +
  '</div>' +
  '<div class="deal-rack-modern">' + products.map(function(p){
    const name = [p.brand, p.productName].filter(Boolean).join(' ');
    return '<div class="deal-tile-modern" onclick="openProduct(\'' + esc(p.productId) + '\')">' +
      '<div class="deal-kicker">' + esc(p.category || 'Featured') + '</div>' +
      '<div class="deal-name">' + esc(name) + '</div>' +
      '<div class="deal-price">' + money(p.minPrice) + '</div>' +
    '</div>';
  }).join('') + '</div>';
}

function renderHomepageMerchandising(){
  renderHomeHero();
  renderBrandStrip();
  renderFeaturedSection();
  renderDealsSection();
}


/* PREMIUM MOTION JS V2 */
function bumpFloatingCart(){
  const btn = document.getElementById('floatingCartBtn');
  if(!btn) return;
  btn.classList.remove('bump');
  void btn.offsetWidth;
  btn.classList.add('bump');
}

function enhancePremiumMotion(){
  document.querySelectorAll('.card').forEach((card, index) => {
    if(card.dataset.motionReady === '1') return;
    card.dataset.motionReady = '1';
    card.style.animationDelay = Math.min(index * 0.025, 0.22) + 's';
  });
}

if(!window.__premiumMotionObserverBound){
  window.__premiumMotionObserverBound = true;
  const motionObserver = new MutationObserver(() => enhancePremiumMotion());
  motionObserver.observe(document.body, {childList:true, subtree:true});
  document.addEventListener('DOMContentLoaded', enhancePremiumMotion);
}

function render(){
  setTimeout(enhancePremiumMotion,0);
  renderHomepageMerchandising();
  setTimeout(updateFloatingCart,0);
  setTimeout(syncMobileSearch,0);
  applySettingsTheme(state.settings||{}); document.getElementById('stats').textContent=`${state.filtered.length} products shown · ${state.products.length} total`; document.getElementById('grid').innerHTML=state.filtered.length?state.filtered.map(card).join(''):'<div class="empty">No products found.</div>'; }

function adjustQty(id,delta){
  const el=document.getElementById('qty_'+id);
  if(!el)return;
  const next=Math.max(1,Number(el.value||1)+delta);
  el.value=next;
}


function closeProductModal(modal){
  const target = modal || document.querySelector('.modal-overlay');
  if(!target) return;
  target.classList.add('closing');
  setTimeout(() => {
    if(target && target.parentNode) target.remove();
  }, 180);
}

function closeTopModal(){
  const modals = Array.from(document.querySelectorAll('.modal-overlay'));
  const top = modals[modals.length - 1];
  if(top) {
    closeProductModal(top);
    return true;
  }
  return false;
}

function ensureProductModalHistory(){
  if(!history.state || history.state.productModal !== true){
    history.pushState({ productModal:true }, '', location.href);
  }
}

function closeProductModalFromBack(){
  const modal = document.querySelector('.modal-overlay');
  if(modal) closeProductModal(modal);
}

if(!window.__productModalBackHandlerBound){
  window.__productModalBackHandlerBound = true;
  window.addEventListener('popstate', closeProductModalFromBack);
}

function enhancedAddToCart(productId, variantId, button){
  if(typeof addToCart !== 'function') return;

  addToCart(productId, variantId);
  bumpFloatingCart();

  if(button){
    const oldText = button.textContent;
    button.classList.add('added','just-added');
    button.textContent = '✓ Added';
    button.disabled = true;

    setTimeout(() => {
      button.disabled = false;
      button.classList.remove('just-added');
      button.textContent = oldText || 'Add to Cart';
    }, 900);
  }

  setTimeout(() => {
    const modal = document.querySelector('.modal-overlay');
    if(modal) closeProductModal(modal);
  }, 350);
}

function openProduct(id){
  const p=state.products.find(x=>x.productId===id);
  if(!p)return;
  const variants=p.variants||[];
  const min=variants.length?Math.min(...variants.map(v=>Number(v.retailPrice||0)).filter(n=>!isNaN(n))):p.minPrice;
  const vars=variants.map(v=>{
    const label=[v.variant,v.color].filter(Boolean).join(' / ')||v.sku;
    const sold=Number(v.stockAvailable||0)<=0;
    return `<div class="variant-modern ${sold?'sold':''}">
      <div class="variant-top">
        <div>
          <div class="variant-name">${esc(label)}</div>
          <div class="variant-meta">SKU: ${esc(v.sku)} · ${esc(v.condition||'New')} · Warranty: ${esc(v.warranty||'-')} · ${esc(v.stockStatus)} (${v.stockAvailable||0})</div>
        </div>
        <div class="variant-price">${money(v.retailPrice)}</div>
      </div>
      <div class="variant-controls">
        <div class="qty-stepper">
          <button onclick="adjustQty('${esc(v.variantId)}',-1)">−</button>
          <input type="number" min="1" value="1" id="qty_${esc(v.variantId)}">
          <button onclick="adjustQty('${esc(v.variantId)}',1)">+</button>
        </div>
        <button class="add-modern" ${sold?'disabled':''} onclick="enhancedAddToCart('${esc(p.productId)}','${esc(v.variantId)}',this)">${sold?'Sold Out':'Add to Cart'}</button>
      </div>
    </div>`;
  }).join('');

  const modal=document.createElement('div');
  modal.className='modal-overlay';
  modal.innerHTML=`<div class="modal-box">
    <div class="product-sheet">
      <div class="sheet-hero">
        <button class="sheet-close" onclick="closeProductModal(this.closest('.modal-overlay'))">×</button>
        <div class="sheet-image-wrap">${p.imageUrl?`<img class="sheet-image" src="${esc(p.imageUrl)}" alt="${esc([p.brand,p.productName].filter(Boolean).join(' '))}">`:'<div class="noimg">No image</div>'}</div>
      </div>
      <div class="sheet-body">
        <div class="sheet-kicker">${esc(p.category)}${p.subcategory?' / '+esc(p.subcategory):''}</div>
        <h2 class="sheet-title">${esc([p.brand,p.productName].filter(Boolean).join(' '))}</h2>
        ${p.description?`<p class="sheet-desc">${esc(p.description)}</p>`:''}
        <div class="sheet-specs">${specsHtml(p.specs)}</div>
        <h3 class="sheet-section-title">Available options</h3>
        ${vars||'<div class="empty">No active variants.</div>'}
      </div>
      <div class="sheet-sticky">
        <div><span class="mini">Starting from</span><strong>${money(min)}</strong></div>
        <button class="whatsapp" onclick="this.closest('.modal-overlay').remove();openCart();">View Cart</button>
      </div>
    </div>
  </div>`;
  modal.addEventListener('click',e=>{ if(e.target===modal) closeProductModal(modal); });
  document.body.appendChild(modal);
  ensureProductModalHistory();
}
function addToCart(pid,vid){
  const p=state.products.find(x=>x.productId===pid);
  const v=p?.variants?.find(x=>x.variantId===vid);
  if(!p||!v)return;
  const qty=Math.max(1,Number(document.getElementById('qty_'+vid)?.value||1));
  const key=vid;
  if(!state.cart[key]){
    state.cart[key]={...v, brand:p.brand, productName:p.productName, category:p.category, imageUrl:p.imageUrl, qty:0};
  }
  state.cart[key].qty+=qty;
  updateCart();
  updateFloatingCart();
  showToast('Added to cart');
}
function updateCart(){ const items=Object.values(state.cart); const count=items.reduce((s,i)=>s+i.qty,0); const total=items.reduce((s,i)=>s+i.qty*displayPrice(i.retailPrice),0); document.getElementById('cartCount').textContent=count+' item'+(count===1?'':'s'); document.getElementById('cartTotal').textContent=moneyDisplay(total); updateFloatingCart(); }

function updateFloatingCart(){
  const btn=document.getElementById('floatingCartBtn');
  const countEl=document.getElementById('floatingCartCount');
  const totalEl=document.getElementById('floatingCartTotal');
  if(!btn||!countEl||!totalEl)return;
  const items=Object.values(state.cart||{});
  const count=items.reduce((s,i)=>s+Number(i.qty||0),0);
  const total=items.reduce((s,i)=>s+Number(i.qty||0)*displayPrice(i.retailPrice),0);
  countEl.textContent=count;
  totalEl.textContent=moneyDisplay(total);
  btn.style.display=count>0?'flex':'none';
}
function changeCartQty(vid,delta){
  if(!state.cart[vid])return;
  state.cart[vid].qty=Math.max(0,Number(state.cart[vid].qty||0)+Number(delta||0));
  if(state.cart[vid].qty<=0)delete state.cart[vid];
  updateCart();
  const old=document.querySelector('.cart-drawer-overlay');
  if(old){old.remove();openCart();}
}

function openCart(){
  const items=Object.values(state.cart||{});
  const total=items.reduce((s,i)=>s+Number(i.qty||0)*displayPrice(i.retailPrice),0);
  const count=items.reduce((s,i)=>s+Number(i.qty||0),0);
  const d=document.createElement('div');
  d.className='cart-drawer-overlay';

  const lines=items.length?items.map(i=>{
    const name=[i.brand,i.productName].filter(Boolean).join(' ');
    const label=[i.variant,i.color].filter(Boolean).join(' / ')||i.sku||'';
    const img=i.imageUrl?`<img class="cart-line-img" src="${esc(i.imageUrl)}" alt="${esc(name)}">`:`<div class="cart-line-img"></div>`;
    return `<div class="cart-line">
      ${img}
      <div class="cart-line-main">
        <div class="cart-line-title">${esc(name)}</div>
        <div class="cart-line-meta">${esc(label)} · SKU: ${esc(i.sku||'')}</div>
        <div class="cart-line-bottom">
          <div class="cart-qty">
            <button type="button" data-qty-minus="${esc(i.variantId)}">−</button>
            <span>${Number(i.qty||0)}</span>
            <button type="button" data-qty-plus="${esc(i.variantId)}">+</button>
          </div>
          <div class="cart-line-price">${moneyDisplay(Number(i.qty||0)*displayPrice(i.retailPrice))}</div>
          <button type="button" class="cart-remove" data-remove="${esc(i.variantId)}">Remove</button>
        </div>
      </div>
    </div>`;
  }).join(''):`<div class="cart-empty-modern"><strong>Your cart is empty</strong>Add products to start a WhatsApp order.</div>`;

  d.innerHTML=`<div class="cart-drawer">
    <div class="cart-drawer-head">
      <div><h3>Your Cart</h3><div class="cart-drawer-sub">${count} item${count===1?'':'s'} selected</div></div>
      <button type="button" class="cart-close-btn" data-close-cart>×</button>
    </div>
    <div class="cart-drawer-body">${lines}</div>
    <div class="cart-form-modern">
      <label>Name<input id="custName" autocomplete="name"></label>
      <label>Phone<input id="custPhone" autocomplete="tel"></label>
      <label>Address / Notes<textarea id="custAddress" rows="2"></textarea></label>
    </div>
    <div class="cart-drawer-foot">
      <div class="cart-total-row"><span>Total estimate</span><strong>${moneyDisplay(total)}</strong></div>
      <div class="cart-checkout-grid">
        <button type="button" class="cart-secondary" data-clear-cart>Clear</button>
        <button type="button" class="cart-primary" ${items.length?'':'disabled'} data-checkout-cart>WhatsApp Order</button>
      </div>
    </div>
  </div>`;

  d.addEventListener('click',e=>{
    if(e.target===d||e.target.hasAttribute('data-close-cart'))d.remove();
    const plus=e.target.getAttribute('data-qty-plus');
    const minus=e.target.getAttribute('data-qty-minus');
    const rem=e.target.getAttribute('data-remove');
    if(plus)changeCartQty(plus,1);
    if(minus)changeCartQty(minus,-1);
    if(rem){removeCart(rem);d.remove();openCart();}
    if(e.target.hasAttribute('data-clear-cart')){clearCart();d.remove();}
    if(e.target.hasAttribute('data-checkout-cart'))checkoutWhatsApp();
  });
  document.body.appendChild(d);
}

function removeCart(vid){ delete state.cart[vid]; updateCart(); updateFloatingCart(); }
function clearCart(){ state.cart={}; updateCart(); updateFloatingCart(); }
function checkoutWhatsApp(){
  const items=Object.values(state.cart);
  if(!items.length)return;

  const name=document.getElementById('custName').value.trim();
  const phone=document.getElementById('custPhone').value.trim();
  const address=document.getElementById('custAddress').value.trim();
  const total=items.reduce((s,i)=>s+i.qty*displayPrice(i.retailPrice),0);

  const payload={
    customerName:name,
    customerPhone:phone,
    customerAddress:address,
    total,
    currency:state.data.settings.displayCurrency||state.data.settings.currency,
    baseCurrency:state.data.settings.baseCurrency||'USD',
    exchangeRateUsdToSrd:Number(state.data.settings.exchangeRateUsdToSrd||1),
    source:'Public Catalog',
    items:items.map(i=>({
      sku:i.sku,
      productId:i.productId,
      variantId:i.variantId,
      brand:i.brand,
      productName:i.productName,
      variant:i.variant,
      color:i.color,
      qty:i.qty,
      basePrice:i.retailPrice,
      displayPrice:displayPrice(i.retailPrice),
      price:displayPrice(i.retailPrice),
      subtotal:i.qty*displayPrice(i.retailPrice)
    }))
  };

  const lines=['Hi, I am interested in ordering these electronics items:',''];
  items.forEach((i,n)=>lines.push(`${n+1}. ${i.brand} ${i.productName} - ${i.variant||''} ${i.color||''}
SKU: ${i.sku}
Qty: ${i.qty}
Price: ${moneyFromBase(i.retailPrice)}
Subtotal: ${moneyDisplay(i.qty*displayPrice(i.retailPrice))}`));
  lines.push('',`Total: ${moneyDisplay(total)}`);
  if(name)lines.push(`Name: ${name}`);
  if(phone)lines.push(`Phone: ${phone}`);
  if(address)lines.push(`Address/Notes: ${address}`);

  const wa=String(state.data.settings.whatsappNumber||'').replace(/\D/g,'');
  const waUrl='https://wa.me/'+wa+'?text='+encodeURIComponent(lines.join('\n'));

  // Open WhatsApp immediately. Do not wait for Apps Script.
  window.open(waUrl,'_blank');

  // Log in the background after the browser has already opened WhatsApp.
  setTimeout(()=>{
    jsonp({action:'logOrder',payload:JSON.stringify(payload)})
      .then(()=>console.log('Order logged'))
      .catch(err=>console.warn('Order log failed:',err));
  },50);
}
load().catch(err=>{document.getElementById('stats').textContent='Error: '+err.message;});

if(!window.__productModalEscapeBound){
  window.__productModalEscapeBound = true;
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closeTopModal();
  });
}

</script>
<button id="floatingCartBtn" class="floating-cart-btn" onclick="openCart()" type="button">
  <span>Cart</span>
  <span id="floatingCartCount" class="count">0</span>
  <span id="floatingCartTotal" class="total">SRD 0</span>
</button>

</body>
</html>
