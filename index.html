<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electronics Catalog</title>
  <style>
    :root{--theme:#0F172A;--accent:#2563EB;--bg:#F8FAFC;--card:#fff;--text:#111827;--muted:#64748B;--line:#E2E8F0;--ok:#047857;--warn:#B45309;--danger:#B91C1C}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}header{background:linear-gradient(135deg,var(--theme),#020617);color:#fff;padding:22px 16px 28px;border-bottom:4px solid var(--accent)}.wrap{max-width:1120px;margin:0 auto}.brand-row{display:flex;gap:12px;align-items:center}.logo{width:54px;height:54px;border-radius:16px;object-fit:cover;display:none;background:rgba(255,255,255,.12)}h1{margin:0;font-size:26px;line-height:1.15}.subtitle{margin:8px 0 0;color:#CBD5E1;font-size:14px;line-height:1.45}.toolbar{position:sticky;top:0;z-index:20;background:white;border-bottom:1px solid var(--line);padding:12px 16px;box-shadow:0 8px 20px rgba(15,23,42,.04)}.toolbar-grid{max-width:1120px;margin:0 auto;display:grid;grid-template-columns:1fr 190px 170px;gap:10px}input,select,button,textarea{font:inherit;border:1px solid var(--line);border-radius:13px;padding:12px;background:white}.chips{max-width:1120px;margin:10px auto 0;display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}.chip{border:1px solid var(--line);background:#fff;color:#334155;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:900;white-space:nowrap;cursor:pointer}.chip.active{background:var(--theme);color:white;border-color:var(--theme);box-shadow:0 0 0 3px rgba(37,99,235,.14)}main{padding:18px 16px 120px}.stats{font-size:13px;color:var(--muted);margin-bottom:12px}.featured{margin-bottom:20px}.section-head{display:flex;justify-content:space-between;align-items:end;margin-bottom:10px;gap:12px}.section-title{font-size:18px;font-weight:950;margin:0}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 10px 24px rgba(15,23,42,.06);display:flex;flex-direction:column;transition:.16s}.card:hover{transform:translateY(-2px);box-shadow:0 16px 36px rgba(15,23,42,.11)}.imgbox{aspect-ratio:1/1;background:#E5E7EB;display:grid;place-items:center;overflow:hidden}.imgbox img{width:100%;height:100%;object-fit:cover}.noimg{color:var(--muted);font-size:12px;text-align:center;padding:12px}.content{padding:14px;display:grid;gap:8px;flex:1}.category{font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.06em}.title{font-size:16px;line-height:1.22;font-weight:950;min-height:39px}.desc{font-size:13px;color:#334155;line-height:1.35;min-height:36px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.specs{display:flex;flex-wrap:wrap;gap:6px;min-height:24px}.spec{background:#F1F5F9;border:1px solid var(--line);border-radius:999px;padding:5px 7px;font-size:11px;font-weight:800;color:#334155}.row{display:flex;justify-content:space-between;align-items:center;gap:8px}.price{font-weight:950;font-size:19px;color:var(--theme)}.badge{font-size:12px;font-weight:900;border-radius:999px;padding:6px 9px;background:#ECFDF5;color:var(--ok);white-space:nowrap}.badge.low{background:#FFFBEB;color:var(--warn)}.badge.sold{background:#FEF2F2;color:var(--danger)}.ribbons{position:absolute;top:10px;left:10px;display:grid;gap:5px;z-index:2}.ribbon{width:fit-content;border-radius:999px;padding:5px 8px;font-size:10px;font-weight:950;color:white;text-transform:uppercase;box-shadow:0 8px 18px rgba(15,23,42,.18)}.r-new{background:#2563EB}.r-hot{background:#DC2626}.r-sale{background:#16A34A}.r-featured{background:#F59E0B;color:#111827}.actions{margin-top:auto;display:grid;gap:8px}.btn{border:none;background:var(--theme);color:white;font-weight:950;cursor:pointer;min-height:45px}.btn:disabled{opacity:.45;cursor:not-allowed}.btn-soft{background:#F1F5F9;color:#334155;border:1px solid var(--line);font-weight:900;cursor:pointer}.cartbar{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid var(--line);padding:12px 16px;z-index:40;box-shadow:0 -10px 30px rgba(15,23,42,.12)}.cart-inner{max-width:1120px;margin:0 auto;display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center}.cart-info{font-size:14px;color:var(--muted)}.cart-info strong{color:var(--text)}.whatsapp{background:#16A34A;color:white;border:none;font-weight:950;cursor:pointer}.empty{text-align:center;color:var(--muted);padding:50px 16px;background:white;border:1px dashed var(--line);border-radius:20px}.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.72);display:flex;align-items:center;justify-content:center;padding:16px;z-index:1000}.modal-box{width:min(96vw,760px);max-height:88vh;overflow:auto;background:white;border-radius:24px;padding:18px;box-shadow:0 30px 80px rgba(0,0,0,.3)}.modal-head{display:flex;justify-content:space-between;gap:12px;margin-bottom:14px}.xbtn{border:1px solid var(--line);background:#F8FAFC;cursor:pointer;padding:8px 11px;border-radius:999px;font-weight:950}.preview-layout{display:grid;grid-template-columns:240px 1fr;gap:16px}.preview-image{width:100%;aspect-ratio:1/1;border-radius:18px;object-fit:cover;background:#E5E7EB;border:1px solid var(--line)}.variant-row{display:grid;grid-template-columns:1fr 90px 74px;gap:8px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:9px;margin-top:8px}.variant-name{font-weight:900;font-size:13px}.variant-meta{font-size:12px;color:var(--muted);margin-top:2px}.qty{width:74px;text-align:center}.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.62);z-index:900;display:flex;justify-content:flex-end}.drawer{width:min(92vw,430px);height:100%;background:white;padding:16px;overflow:auto;box-shadow:-24px 0 70px rgba(0,0,0,.22)}.drawer-head{display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:12px}.cart-line{border-bottom:1px solid var(--line);padding:10px 0;display:grid;gap:6px}.cart-line-title{font-weight:950}.form{display:grid;gap:10px;margin-top:14px}.form label{display:grid;gap:6px;font-size:13px;font-weight:800;color:var(--muted)}.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#0F172A;color:white;padding:12px 14px;border-radius:16px;z-index:2000;display:none;box-shadow:0 18px 45px rgba(15,23,42,.28)}@media(max-width:850px){.toolbar-grid{grid-template-columns:1fr 1fr}.toolbar-grid input{grid-column:1/-1}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.preview-layout{grid-template-columns:1fr}.preview-image{max-width:280px}.cart-inner{grid-template-columns:1fr}.cart-inner button{width:100%}}@media(max-width:560px){header{padding:20px 14px 24px}h1{font-size:22px}.toolbar{padding:10px 8px}.toolbar-grid{grid-template-columns:1fr}.chips{margin-top:8px}.grid{grid-template-columns:1fr;gap:12px}main{padding:14px 8px 120px}.content{padding:13px}.cartbar{padding:10px 8px}.variant-row{grid-template-columns:1fr}.qty{width:100%}}
  
/* FINAL MOBILE 3-COLUMN OVERRIDE */
@media (max-width: 700px) {
  .grid,
  .category-grid,
  #productsGrid,
  #featuredGrid {
    display: grid !important;
    grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
    gap: 8px !important;
  }

  .card {
    border-radius: 12px !important;
    min-width: 0 !important;
  }

  .imgbox {
    aspect-ratio: 1 / 1 !important;
  }

  .content {
    padding: 7px !important;
    gap: 4px !important;
    min-height: auto !important;
  }

  .category {
    font-size: 8px !important;
    line-height: 1.15 !important;
  }

  .title {
    font-size: 10.5px !important;
    line-height: 1.18 !important;
    min-height: 25px !important;
    -webkit-line-clamp: 2 !important;
  }

  .desc,
  .specs,
  .preview-desc {
    display: none !important;
  }

  .price {
    font-size: 11px !important;
    line-height: 1.1 !important;
  }

  .badge {
    font-size: 8px !important;
    padding: 3px 5px !important;
  }

  .btn,
  .product-actions button {
    min-height: 30px !important;
    font-size: 9px !important;
    padding: 6px 4px !important;
    border-radius: 9px !important;
  }

  .product-actions {
    gap: 5px !important;
    padding-top: 3px !important;
  }

  main {
    padding-left: 8px !important;
    padding-right: 8px !important;
  }
}

</style>
</head>
<body>
<header><div class="wrap"><div class="brand-row"><img id="logo" class="logo"><div><h1 id="storeName">Electronics Catalog</h1><p id="welcome" class="subtitle">Loading catalog...</p></div></div></div></header>
<div class="toolbar"><div class="toolbar-grid"><input id="search" placeholder="Search brand, model, SKU, specs..."><select id="brandFilter"><option value="">All brands</option></select><select id="sort"><option value="featured">Featured first</option><option value="priceLow">Price: low to high</option><option value="priceHigh">Price: high to low</option><option value="stock">Available first</option></select></div><div id="chips" class="chips"></div></div>
<main class="wrap"><div id="stats" class="stats">Loading...</div><div id="featured" class="featured"></div><div id="grid" class="grid"></div></main>
<footer class="wrap" id="footer"></footer>
<div class="cartbar"><div class="cart-inner"><div class="cart-info"><strong id="cartCount">0 items</strong> · <span id="cartTotal">SRD 0</span></div><button class="btn-soft" onclick="openCart()">View Cart</button><button class="whatsapp" onclick="openCart()">Checkout WhatsApp</button></div></div>
<div id="toast" class="toast"></div>
<script>
const CATALOG_API_URL = 'https://script.google.com/macros/s/AKfycbzsXy8qj0UWmid2K-3MOl-dAT7jYjuRKY5Iw4Q0EoY7rA2b_l87-cBbeBiYFwY4hY851A/exec'; // Paste Apps Script web app /exec URL here if hosted outside Apps Script.
const state = {data:null, products:[], filtered:[], category:'', brand:'', search:'', cart:{}};
function apiUrl(params){ const base = CATALOG_API_URL || location.href.split('?')[0]; const u = new URL(base); Object.keys(params||{}).forEach(k=>u.searchParams.set(k, params[k])); u.searchParams.set('_', Date.now()); return u.toString(); }
function jsonp(params){ return new Promise((resolve,reject)=>{ const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2); window[cb]=d=>{delete window[cb]; s.remove(); resolve(d)}; const s=document.createElement('script'); s.src=apiUrl({...params, callback:cb}); s.onerror=()=>reject(new Error('Could not load API')); document.body.appendChild(s); }); }
function displayPrice(usd){
  const s=state.data?.settings||{};
  const rate=Number(s.exchangeRateUsdToSrd||s.exchangeRate||1);
  const roundTo=Number(s.roundDisplayPriceTo||5);
  const raw=Number(usd||0)*rate;
  return roundTo>0 ? Math.round(raw/roundTo)*roundTo : raw;
}
function moneyFromBase(n){ const c=state.data?.settings?.displayCurrency||state.data?.settings?.currency||'SRD'; return c+' '+Number(displayPrice(n)||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}); }
function moneyDisplay(n){ const c=state.data?.settings?.displayCurrency||state.data?.settings?.currency||'SRD'; return c+' '+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}); }
function money(n){ return moneyFromBase(n); }
function esc(s){ return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2400); }
async function load(){ const data=await jsonp({action:'catalog'}); if(!data.ok) throw new Error(data.error||'API error'); state.data=data; state.products=data.products||[]; applySettings(); renderFilters(); filter(); }
function applySettings(){ const s=state.data.settings||{}; document.documentElement.style.setProperty('--theme', s.themeColor||'#0F172A'); document.documentElement.style.setProperty('--accent', s.accentColor||'#2563EB'); document.title=s.storeName||'Electronics Catalog'; document.getElementById('storeName').textContent=s.storeName||s.catalogTitle||'Electronics Catalog'; document.getElementById('welcome').textContent=s.welcomeText||''; document.getElementById('footer').textContent=s.footerText||''; const logo=document.getElementById('logo'); if(s.logoUrl){ logo.src=s.logoUrl; logo.style.display='block'; } }
function renderFilters(){ const cats=['All',...(state.data.categories||[])]; document.getElementById('chips').innerHTML=cats.map(c=>`<button class="chip ${(!state.category&&c==='All')||state.category===c?'active':''}" onclick="setCategory('${esc(c==='All'?'':c)}')">${esc(c)}</button>`).join(''); const brand=document.getElementById('brandFilter'); brand.innerHTML='<option value="">All brands</option>'+(state.data.brands||[]).map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join(''); }
function setCategory(c){ state.category=c; renderFilters(); filter(); }
document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value.toLowerCase();filter();});
document.getElementById('brandFilter').addEventListener('change',e=>{state.brand=e.target.value;filter();});
document.getElementById('sort').addEventListener('change',filter);
function filter(){ let p=[...state.products]; if(state.category)p=p.filter(x=>x.category===state.category); if(state.brand)p=p.filter(x=>x.brand===state.brand); if(state.search){ const q=state.search; p=p.filter(x=>JSON.stringify([x.brand,x.productName,x.category,x.subcategory,x.description,x.specs,x.variants]).toLowerCase().includes(q)); } const sort=document.getElementById('sort').value; if(sort==='priceLow')p.sort((a,b)=>a.minPrice-b.minPrice); if(sort==='priceHigh')p.sort((a,b)=>b.minPrice-a.minPrice); if(sort==='stock')p.sort((a,b)=>b.stockAvailable-a.stockAvailable); state.filtered=p; render(); }
function statusClass(s){ return s==='Sold Out'?'sold':(s==='Low Stock'?'low':''); }
function specsHtml(specs){ return String(specs||'').split(/[•,|;]/).map(x=>x.trim()).filter(Boolean).slice(0,4).map(x=>`<span class="spec">${esc(x)}</span>`).join(''); }
function ribbons(p){ return `<div class="ribbons">${p.featured?'<span class="ribbon r-featured">Featured</span>':''}${p.new?'<span class="ribbon r-new">New</span>':''}${p.hot?'<span class="ribbon r-hot">Popular</span>':''}${p.sale?'<span class="ribbon r-sale">Deal</span>':''}</div>`; }
function card(p){ return `<article class="card">${ribbons(p)}<div class="imgbox">${p.imageUrl?`<img src="${esc(p.imageUrl)}" loading="lazy">`:'<div class="noimg">No image</div>'}</div><div class="content"><div class="category">${esc(p.category)}${p.subcategory?' / '+esc(p.subcategory):''}</div><div class="title">${esc([p.brand,p.productName].filter(Boolean).join(' '))}</div><div class="desc">${esc(p.description||'Tap to view available models, prices, warranty and stock.')}</div><div class="specs">${specsHtml(p.specs)}</div><div class="row"><div class="price">${money(p.minPrice)}</div><span class="badge ${statusClass(p.stockStatus)}">${esc(p.stockStatus)}</span></div><div class="actions"><button class="btn" onclick="openProduct('${esc(p.productId)}')">View Options</button></div></div></article>`; }
function render(){ document.getElementById('stats').textContent=`${state.filtered.length} products shown · ${state.products.length} total`; document.getElementById('grid').innerHTML=state.filtered.length?state.filtered.map(card).join(''):'<div class="empty">No products found.</div>'; }
function openProduct(id){ const p=state.products.find(x=>x.productId===id); if(!p)return; const vars=(p.variants||[]).map(v=>`<div class="variant-row"><div><div class="variant-name">${esc([v.variant,v.color].filter(Boolean).join(' / ')||v.sku)}</div><div class="variant-meta">SKU: ${esc(v.sku)} · ${esc(v.condition)} · Warranty: ${esc(v.warranty||'-')} · ${esc(v.stockStatus)} (${v.stockAvailable||0})</div></div><strong>${money(v.retailPrice)}</strong><input class="qty" type="number" min="1" value="1" id="qty_${esc(v.variantId)}"></div><button class="btn" ${v.stockAvailable<=0?'disabled':''} onclick="addToCart('${esc(p.productId)}','${esc(v.variantId)}')">Add ${esc(v.sku)}</button>`).join(''); const modal=document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-box"><div class="modal-head"><div><h2>${esc([p.brand,p.productName].filter(Boolean).join(' '))}</h2><div class="variant-meta">${esc(p.category)}${p.subcategory?' / '+esc(p.subcategory):''}</div></div><button class="xbtn" onclick="this.closest('.modal-overlay').remove()">×</button></div><div class="preview-layout"><img class="preview-image" src="${esc(p.imageUrl||'')}" onerror="this.style.display='none'"><div><p>${esc(p.description||'')}</p><div class="specs">${specsHtml(p.specs)}</div><h3>Available options</h3>${vars||'<div class="empty">No active variants.</div>'}</div></div></div>`; document.body.appendChild(modal); }
function addToCart(pid,vid){ const p=state.products.find(x=>x.productId===pid); const v=p?.variants?.find(x=>x.variantId===vid); if(!p||!v)return; const qty=Math.max(1,Number(document.getElementById('qty_'+vid)?.value||1)); const key=vid; if(!state.cart[key]) state.cart[key]={...v, brand:p.brand, productName:p.productName, category:p.category, qty:0}; state.cart[key].qty+=qty; updateCart(); showToast('Added to cart'); }
function updateCart(){ const items=Object.values(state.cart); const count=items.reduce((s,i)=>s+i.qty,0); const total=items.reduce((s,i)=>s+i.qty*displayPrice(i.retailPrice),0); document.getElementById('cartCount').textContent=count+' item'+(count===1?'':'s'); document.getElementById('cartTotal').textContent=moneyDisplay(total); }
function openCart(){ const items=Object.values(state.cart); const total=items.reduce((s,i)=>s+i.qty*displayPrice(i.retailPrice),0); const d=document.createElement('div'); d.className='drawer-overlay'; d.innerHTML=`<div class="drawer"><div class="drawer-head"><div><h2>Your Cart</h2><div class="variant-meta">${items.length} selected · ${moneyDisplay(total)}</div></div><button class="xbtn" onclick="this.closest('.drawer-overlay').remove()">×</button></div>${items.length?items.map(i=>`<div class="cart-line"><div class="cart-line-title">${esc(i.brand)} ${esc(i.productName)}</div><div class="variant-meta">${esc(i.variant)} ${esc(i.color)} · SKU ${esc(i.sku)}</div><div class="row"><span>Qty ${i.qty} × ${money(i.retailPrice)}</span><strong>${moneyDisplay(i.qty*displayPrice(i.retailPrice))}</strong></div><button class="btn-soft" onclick="removeCart('${esc(i.variantId)}');this.closest('.drawer-overlay').remove();openCart();">Remove</button></div>`).join(''):'<div class="empty">Cart is empty.</div>'}<div class="form"><label>Name<input id="custName"></label><label>Phone<input id="custPhone"></label><label>Address / Notes<textarea id="custAddress" rows="3"></textarea></label><button class="whatsapp" ${!items.length?'disabled':''} onclick="checkoutWhatsApp()">Send WhatsApp Order</button><button class="btn-soft" onclick="clearCart();this.closest('.drawer-overlay').remove();">Clear Cart</button></div></div>`; document.body.appendChild(d); }
function removeCart(vid){ delete state.cart[vid]; updateCart(); }
function clearCart(){ state.cart={}; updateCart(); }
function checkoutWhatsApp(){
  const items=Object.values(state.cart);
  if(!items.length)return;

  const name=document.getElementById('custName').value.trim();
  const phone=document.getElementById('custPhone').value.trim();
  const address=document.getElementById('custAddress').value.trim();
  const total=items.reduce((s,i)=>s+i.qty*displayPrice(i.retailPrice),0);

  const payload={
    customerName:name,
    customerPhone:phone,
    customerAddress:address,
    total,
    currency:state.data.settings.displayCurrency||state.data.settings.currency,
    baseCurrency:state.data.settings.baseCurrency||'USD',
    exchangeRateUsdToSrd:Number(state.data.settings.exchangeRateUsdToSrd||1),
    source:'Public Catalog',
    items:items.map(i=>({
      sku:i.sku,
      productId:i.productId,
      variantId:i.variantId,
      brand:i.brand,
      productName:i.productName,
      variant:i.variant,
      color:i.color,
      qty:i.qty,
      basePrice:i.retailPrice,
      displayPrice:displayPrice(i.retailPrice),
      price:displayPrice(i.retailPrice),
      subtotal:i.qty*displayPrice(i.retailPrice)
    }))
  };

  const lines=['Hi, I am interested in ordering these electronics items:',''];
  items.forEach((i,n)=>lines.push(`${n+1}. ${i.brand} ${i.productName} - ${i.variant||''} ${i.color||''}
SKU: ${i.sku}
Qty: ${i.qty}
Price: ${moneyFromBase(i.retailPrice)}
Subtotal: ${moneyDisplay(i.qty*displayPrice(i.retailPrice))}`));
  lines.push('',`Total: ${moneyDisplay(total)}`);
  if(name)lines.push(`Name: ${name}`);
  if(phone)lines.push(`Phone: ${phone}`);
  if(address)lines.push(`Address/Notes: ${address}`);

  const wa=String(state.data.settings.whatsappNumber||'').replace(/\D/g,'');
  const waUrl='https://wa.me/'+wa+'?text='+encodeURIComponent(lines.join('\n'));

  // Open WhatsApp immediately. Do not wait for Apps Script.
  window.open(waUrl,'_blank');

  // Log in the background after the browser has already opened WhatsApp.
  setTimeout(()=>{
    jsonp({action:'logOrder',payload:JSON.stringify(payload)})
      .then(()=>console.log('Order logged'))
      .catch(err=>console.warn('Order log failed:',err));
  },50);
}
load().catch(err=>{document.getElementById('stats').textContent='Error: '+err.message;});
</script>
</body>
</html>
